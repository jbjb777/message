<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>실시간 메시지 보드</title>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: #050505;
      color: white;
      font-family: sans-serif;
      height: 100vh;
      overflow: hidden;
      position: relative;
    }

    #background-echo {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes floatUp {
      0% { transform: translateY(var(--start-y)); opacity: 0; }
      15% { opacity: var(--max-opacity); }
      85% { opacity: var(--max-opacity); }
      100% { transform: translateY(-20vh); opacity: 0; }
    }

    .echo-message {
      position: absolute;
      color: white;
      white-space: nowrap;
      /* 모든 메시지는 기본적으로 무한 반복 */
      animation: floatUp linear infinite;
    }

    .ui-layer {
      position: absolute;
      bottom: 40px; left: 50%;
      transform: translateX(-50%);
      width: 100%; max-width: 700px;
      z-index: 10;
      padding: 0 20px;
      display: flex; flex-direction: column; gap: 10px;
    }

    h1 { text-align: center; margin: 0 0 10px 0; font-size: 24px; opacity: 0.8; }

    .write-box {
      display: flex; gap: 10px;
      background: rgba(20, 20, 20, 0.7);
      padding: 10px; border-radius: 20px;
      backdrop-filter: blur(5px);
    }

    .write-box input {
      flex: 1; border: none; outline: none; background: transparent;
      color: white; padding: 16px; font-size: 16px;
    }

    .write-box button {
      border: none; background: white; color: black;
      padding: 16px 24px; border-radius: 14px;
      cursor: pointer; font-size: 16px; font-weight: bold;
    }

    .highlight-overlay {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%) scale(0.8);
      opacity: 0; font-size: 48px; font-weight: bold; color: white;
      text-align: center; text-shadow: 0 0 30px rgba(255, 255, 255, 0.8);
      pointer-events: none; z-index: 1000;
      transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      word-break: keep-all; width: 90%;
    }

    .highlight-overlay.show { transform: translate(-50%, -50%) scale(1.1); opacity: 1; }
  </style>
</head>
<body>

<div id="background-echo"></div>
<div id="highlightBox" class="highlight-overlay"></div>

<div class="ui-layer">
  <h1>메시지 보드</h1>
  <div class="write-box">
    <input id="messageInput" type="text" placeholder="메시지를 입력하세요" maxlength="300" />
    <button id="sendButton">전송</button>
  </div>
</div>

<script>
  const SUPABASE_URL = "https://kmfqxpdiclakvoqlwavh.supabase.co";
  const SUPABASE_ANON_KEY = "sb_publishable_2ktHdDZ9xgYjvVCmHFnW7g_Zn56ApXG";
  const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const backgroundEchoEl = document.getElementById("background-echo");
  const inputEl = document.getElementById("messageInput");
  const sendButton = document.getElementById("sendButton");
  const highlightBox = document.getElementById("highlightBox");

  let highlightTimeout;
  let lastTimestamp = new Date().toISOString(); 

  function escapeHtml(text) {
    const div = document.createElement("div");
    div.innerText = text;
    return div.innerHTML;
  }

  /**
   * 메시지 생성 함수
   * isNew: true면 화면 중앙에서 즉시 등장, false면 화면 밖(아래)에서 등장
   */
  function createEchoMessage(content, isNew = false) {
    const div = document.createElement("div");
    div.className = "echo-message";
    div.innerHTML = escapeHtml(content);

    const size = Math.random() * 1.2 + 0.8;
    const leftPos = Math.random() * 80 + 10;
    const duration = Math.random() * 10 + 15; // 15~25초 사이
    const maxOpacity = Math.random() * 0.4 + 0.15;
    
    // 신규 메시지는 화면 중앙 근처에서 즉시 시작, 기존은 화면 아래(110vh)
    const startY = isNew ? (Math.random() * 40 + 30) + "vh" : "110vh";

    div.style.fontSize = `${size}rem`;
    div.style.left = `${leftPos}%`;
    div.style.animationDuration = `${duration}s`;
    div.style.setProperty('--max-opacity', maxOpacity);
    div.style.setProperty('--start-y', startY);

    // 신규 메시지라도 첫 비행 이후에는 계속 반복되도록 설정
    if (!isNew) {
      // 기존 메시지들은 시작 지점을 랜덤하게 꼬아서 겹치지 않게 함
      div.style.animationDelay = `-${Math.random() * duration}s`;
    }

    backgroundEchoEl.appendChild(div);
  }

  function showHighlight(text) {
    highlightBox.innerHTML = escapeHtml(text);
    highlightBox.classList.add("show");
    clearTimeout(highlightTimeout);
    highlightTimeout = setTimeout(() => highlightBox.classList.remove("show"), 2500);
  }

  // 처음 접속 시 메시지들 로드
  async function loadInitialMessages() {
    const { data } = await client.from("messages").select("*").order("created_at", { ascending: false }).limit(50);
    if (data && data.length > 0) {
      backgroundEchoEl.innerHTML = "";
      data.forEach(msg => createEchoMessage(msg.content, false));
      lastTimestamp = data[0].created_at; 
    }
  }

  // 사용자 모르게 주기적으로 호출되는 부분 업데이트 함수
  async function checkForNewMessages() {
    const { data } = await client
      .from("messages")
      .select("*")
      .gt("created_at", lastTimestamp)
      .order("created_at", { ascending: true });

    if (data && data.length > 0) {
      data.forEach(msg => {
        showHighlight(msg.content);
        // 새 메시지를 'isNew = true'로 생성하여 배경 흐름에 합류시킴
        createEchoMessage(msg.content, true);
        lastTimestamp = msg.created_at; 
      });
    }
  }

  async function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    
    inputEl.value = "";
    inputEl.focus();
    
    const { data } = await client.from("messages").insert({ content: text }).select();
    if (data) {
        lastTimestamp = data[0].created_at;
        showHighlight(text);
        createEchoMessage(text, true);
    }
  }

  sendButton.addEventListener("click", sendMessage);
  inputEl.addEventListener("keydown", (e) => { if (e.key === "Enter") sendMessage(); });

  // 1. 초기 로딩
  loadInitialMessages(); 
  
  // 2. 2초마다 사용자 모르게 새 데이터 체크 (Polling)
  setInterval(checkForNewMessages, 2000); 

</script>
</body>
</html>
